data_sources:
  - path: "datasets/motor_data_2011.csv"
  - path: "datasets/motor_data_2012.csv"
  - path: "datasets/motor_data_2013.csv"
  - path: "datasets/motor_data_2014.csv"
  - path: "datasets/motor_data_2015.csv"
  - path: "datasets/motor_data_2016.csv"

columns:
  target: "CLAIM_PAID"
  datetime: "INSR_BEGIN"
  datetime_format: "%d-%b-%y"
  features:
    numeric:
      - "EFFECTIVE_YR"
      - "INSURED_VALUE"
      - "PROD_YEAR"
      - "SEATS_NUM"
      - "CARRYING_CAPACITY"
      - "CCM_TON"
      - "PREMIUM"
    categorical:
      - "SEX"
      - "INSR_TYPE"
      - "TYPE_VEHICLE"
      - "MAKE"
      - "USAGE"
  id: "OBJECT_ID"
  drop:
    - "INSR_END"

batch:
  size: 32768
  sort_by: "INSR_BEGIN"

data_storage:
  data_path: "session/data/db_sqlite.db"
  statistics_path: "session/reports/db_statistics.yaml"
  meta_path: "session/reports/db_meta.yaml"
  quality_path: "session/reports/db_quality.yaml"

quality:
  # Округление чисел во всех quality-выходах (статистика, drift YAML, EDA fallback, бины/insights).
  round_precision: 3
  stats_thresholds:
    missing_frequency: 0.3
    nonvalid_frequency: 0.2
    # meta stats (null = never)
    row_any_missing_frequency: null
    min_id_uniqueness_ratio: null
    # numeric stats
    zero_frequency_warn: 0.95
    zero_frequency_skip_columns: []
    cv_warn: 80.0
    min_abs_mean_for_cv: 0.001
    # categorical stats
    max_category_dominance: 0.995
    # optional: drop numeric features with more than this share of zeros (null = never)
    drop_if_zero_frequency_above: null
  association:
    # Full multi-year DB: cap rows for Apriori (mlxtend is dense / RAM-heavy).
    max_transactions: 50000
    n_bins: 6
    binning: quantile
    exclude_target: true
    exclude_from_association: []
    sample_cap_per_column: 20000
    max_levels_per_categorical: 18
    # Higher support = fewer columns before Apriori; helps RAM on large N.
    min_support: 0.14
    min_confidence: 0.5
    min_lift: 1.05
    top_k: 5
    rule_confidence_threshold: 0.8
    rule_lift_threshold: 1.2
    add_rule_features: true
    max_rule_features: 5
  eda:
    report_path: "session/reports/eda_profile.html"
    max_rows: 30000
    minimal_profile: true
    title: "Vehicle insurance claims — EDA"
  drift:
    reference_path: "session/reports/drift_reference.yaml"
    report_path: "session/reports/drift_report.yaml"
    run_check_after_add_data: true
    fail_on: null
    fail_on_incomplete: false
    mean_shift_sigma_warn: 2.0
    mean_shift_sigma_critical: 4.0
    std_ratio_warn_low: 0.5
    std_ratio_warn_high: 2.0
    std_ratio_critical_low: 0.25
    std_ratio_critical_high: 4.0
    missing_frequency_delta_warn: 0.08
    missing_frequency_delta_critical: 0.15
    categorical_jsd_warn: 0.12
    categorical_jsd_critical: 0.22

preprocessing:
  target_missing_fill: 0
  feature_engineering:
    enabled: true
    log1p:
      - "PREMIUM"
      - "INSURED_VALUE"
    ratios:
      - name: "premium_per_seat"
        numerator: "PREMIUM"
        denominator: "SEATS_NUM"
        eps: 1.0e-6
      - name: "insured_per_ccm"
        numerator: "INSURED_VALUE"
        denominator: "CCM_TON"
        eps: 1.0e-6
    differences:
      - name: "effective_minus_prod_year"
        a: "EFFECTIVE_YR"
        b: "PROD_YEAR"
  default_variant: catboost_ord
  tune_preprocess_variants: true
  variants:
    catboost_ord:
      numeric: { impute: median, scale: false }
      categorical: { impute: most_frequent, encode: ordinal }
    mlp_ohe:
      numeric: { impute: median, scale: true }
      categorical: { impute: most_frequent, encode: onehot }
    mlp_ord:
      numeric: { impute: median, scale: true }
      categorical: { impute: most_frequent, encode: ordinal }

# Валидация при обучении (holdout внутри model.train).
training:
  validation:
    type: holdout
    test_size: 0.2
    random_state: 42

# Гиперпараметры моделей (передаются в конструкторы).
models:
  catboost:
    loss_function: RMSE
    verbose: false
    random_seed: 42
    iterations: 500
  mlp:
    hidden_layer_sizes: [64, 32]
    lr: 0.0005
    max_epochs: 400
    batch_size: 256
    patience: 15
    val_fraction: 0.1
    random_state: 42
    loss: huber
    huber_delta: 1.0
    alpha: 0.0001

logging:
  path: "session/logs/run.log"
  level: INFO

incremental_training:
  enabled: true
  parent_model: "mlp_mlp_ord_20260429_010035"

model_storage:
  models_path: "session/models"