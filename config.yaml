data_sources:
  - path: "datasets/motor_data_2011.csv"
  - path: "datasets/motor_data_2012.csv"
  - path: "datasets/motor_data_2013.csv"
  - path: "datasets/motor_data_2014.csv"

columns:
  target: "CLAIM_PAID"
  datetime: "INSR_BEGIN"
  datetime_format: "%d-%b-%y"
  features:
    - "SEX"
    - "EFFECTIVE_YR"
    - "INSR_TYPE"
    - "INSURED_VALUE"
    - "PREMIUM"
    - "PROD_YEAR"
    - "SEATS_NUM"
    - "CARRYING_CAPACITY"
    - "TYPE_VEHICLE"
    - "CCM_TON"
    - "MAKE"
    - "USAGE"
  id: "OBJECT_ID"
  drop:
    - "INSR_END"

batch:
  size: 10000
  sort_by: "INSR_BEGIN"

data_storage:
  data_path: "session/data/db_sqlite.db"

model_storage:
  models_path: "session/models"