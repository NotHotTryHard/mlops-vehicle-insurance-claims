data_sources:
  - path: "datasets/motor_data_2011.csv"
  - path: "datasets/motor_data_2012.csv"

columns:
  target: "CLAIM_PAID"
  datetime: "INSR_BEGIN"
  datetime_format: "%d-%b-%y"
  features:
    numeric:
      - "EFFECTIVE_YR"
      - "INSURED_VALUE"
      - "PROD_YEAR"
      - "SEATS_NUM"
      - "CARRYING_CAPACITY"
      - "CCM_TON"
      - "PREMIUM"
    categorical:
      - "SEX"
      - "INSR_TYPE"
      - "TYPE_VEHICLE"
      - "MAKE"
      - "USAGE"
  id: "OBJECT_ID"
  drop:
    - "INSR_END"

batch:
  size: 10000
  sort_by: "INSR_BEGIN"

data_storage:
  data_path: "session/data/db_sqlite.db"
  statistics_path: "session/data/db_statistics.yaml"
  meta_path: "session/data/db_meta.yaml"
  quality_path: "session/data/db_quality.yaml"

model_storage:
  models_path: "session/models"